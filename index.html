<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Caloria</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #F6FBFF;
    color: #111;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app {
    height: 100dvh;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    background: #F6FBFF;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.08);
  }

  .slides {
    flex: 0 0 auto;
    width: 100%;
    aspect-ratio: 1280 / 1405;
    max-height: 78dvh;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    touch-action: pan-x;
    margin-top: env(safe-area-inset-top);
  }
  .slides::-webkit-scrollbar { display: none; }

  .slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    scroll-snap-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    overflow: hidden;
  }
  .slide img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 14px 0 10px;
    flex-shrink: 0;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    transition: background 0.2s, transform 0.2s;
    border: 0; padding: 0;
    cursor: pointer;
  }
  .dot.active { background: rgba(0,0,0,0.65); transform: scale(1.25); }

  .caption {
    flex-shrink: 0;
    text-align: center;
    font-size: clamp(18px, 4.6vw, 23px);
    font-weight: 700;
    line-height: 1.35;
    padding: 12px 24px 22px;
    max-width: 520px;
    margin: 0 auto;
    color: #111;
    min-height: calc(2 * 1.35em + 34px);
    will-change: contents;
  }

  .tray {
    flex-shrink: 0;
    background: #F6FBFF;
    border-top-left-radius: 32px;
    border-top-right-radius: 32px;
    box-shadow: 0 -8px 20px rgba(0,0,0,0.08), 0 -1px 0 rgba(0,0,0,0.04);
    padding: 36px 22px calc(34px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 16px;
  }
  .tray button {
    width: 100%;
    background: #111;
    color: #fff;
    border: 0;
    border-radius: 18px;
    padding: 20px;
    font-size: clamp(18px, 4.8vw, 22px);
    font-weight: 800;
    letter-spacing: 0.4px;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  }
  .tray button:active { transform: scale(0.99); }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .tray button.shimmer-active {
    background: linear-gradient(105deg, #111 40%, #555 50%, #111 60%);
    background-size: 200% auto;
    animation: shimmer 0.9s ease forwards;
  }

  .fineprint {
    text-align: center;
    font-size: 13px;
    color: #6b6b70;
    letter-spacing: 0.2px;
    padding-bottom: 2px;
  }

  .quiz {
    width: 100%;
    height: 100%;
    padding: 20px 20px;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }
  .quiz-card {
    width: 100%;
    height: 100%;
    background: #fafafa;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 22px;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .quiz-progress {
    height: 7px;
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .quiz-progress span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #34d399, #10b981);
    width: 0%;
    border-radius: 999px;
    transition: width 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .quiz-title {
    font-size: clamp(19px, 4.8vw, 23px);
    font-weight: 800;
    line-height: 1.25;
    text-align: center;
    margin: 0 0 6px;
    min-height: 2.5em;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quiz-sub {
    font-size: 13px;
    color: #6b6b70;
    text-align: center;
    margin: 0 0 14px;
    line-height: 1.35;
    letter-spacing: 0.3px;
  }
  .quiz-body {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    min-height: 0;
    overflow-y: auto;
  }
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .quiz-options button {
    width: 100%;
    background: #fff;
    color: #111;
    border: 1.5px solid rgba(0,0,0,0.12);
    border-radius: 16px;
    padding: 17px 18px;
    font-size: 16px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .quiz-options button:active { transform: scale(0.99); background: #f1f1f1; }
  .quiz-cta {
    width: 100%;
    background: #2563eb;
    color: #fff;
    border: 0;
    border-radius: 16px;
    padding: 16px;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.4px;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(37,99,235,0.28);
    margin-top: 10px;
    flex-shrink: 0;
  }
  .quiz-cta:active { transform: scale(0.99); }

  .quiz-stage {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .quiz-stage .quiz-title,
  .quiz-stage .quiz-body,
  .quiz-stage .quiz-cta {
    transition: opacity 0.32s ease, transform 0.32s ease;
  }
  .quiz-stage .quiz-body { transition-delay: 0.12s; }
  .quiz-stage .quiz-cta  { transition-delay: 0.18s; }

  .quiz-stage.leaving .quiz-title,
  .quiz-stage.leaving .quiz-body,
  .quiz-stage.leaving .quiz-cta {
    opacity: 0;
    transform: translateY(-8px);
    transition-delay: 0s;
  }
  .quiz-stage.entering .quiz-title,
  .quiz-stage.entering .quiz-body,
  .quiz-stage.entering .quiz-cta {
    opacity: 0;
    transform: translateY(10px);
  }
  .quiz-result {
    text-align: center;
  }
  .quiz-score {
    font-size: 64px;
    font-weight: 800;
    color: #10b981;
    line-height: 1;
    margin: 4px 0 10px;
  }
  .quiz-score-label {
    font-size: 12px;
    color: #6b6b70;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    font-weight: 700;
  }
  .confetti-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 22px;
  }
  .confetti-piece {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 8px;
    height: 12px;
    border-radius: 2px;
    opacity: 0;
    will-change: transform, opacity;
    animation: confetti-burst cubic-bezier(0.16, 0.84, 0.44, 1) forwards;
  }
  @keyframes confetti-burst {
    0%   { opacity: 0; transform: translate3d(0, 0, 0) rotate(0deg); }
    10%  { opacity: 1; }
    50%  { transform: translate3d(var(--peakX, 0), var(--peakY, -260px), 0) rotate(var(--midR, 200deg)); }
    100% { opacity: 0; transform: translate3d(var(--endX, 0), var(--endY, 60px), 0) rotate(var(--r, 540deg)); }
  }
</style>
</head>
<body>
  <div class="app">
    <div style="flex:1 1 0"></div>
    <div class="slides" id="slides"></div>
    <div class="dots" id="dots"></div>
    <div class="caption" id="caption"></div>
    <div style="flex:0.15 1 0"></div>
    <div class="tray">
      <button type="button">START FREE MONTH »</button>
      <div class="fineprint">30 days free · Cancel anytime · No payment now</div>
    </div>
  </div>

<script>
  const SLIDES = [
    { type: 'img', img: 'images/ns1.png', caption: 'Join Caloria today!' },
    { type: 'img', img: 'images/ns2.png', caption: 'Track progress over time.' },
    { type: 'img', img: 'images/ns3.png', caption: 'Set daily goals and hit them.' },
    { type: 'img', img: 'images/ns4.png', caption: 'Rated 4.8/5 by 22K+ users.' },
    { type: 'img', img: 'images/ns5.png', caption: 'Get instant nutrition data.' },
    { type: 'img', img: 'images/ns6.png', caption: 'Snap any food to log it.' },
    { type: 'img', img: 'images/ns7.png', caption: 'Know what you are eating.' },
  ];

  const QUIZ_QUESTIONS = [
    {
      q: 'What is your main goal?',
      options: [
        { label: 'Lose weight',     w: 24 },
        { label: 'Build muscle',    w: 22 },
        { label: 'Eat healthier',   w: 25 },
        { label: 'Maintain weight', w: 20 },
      ],
    },
    {
      q: 'How often do you eat out?',
      options: [
        { label: 'Almost daily',         w: 23 },
        { label: 'A few times a week',   w: 21 },
        { label: 'Rarely',               w: 18 },
      ],
    },
    {
      q: 'Do you track your meals today?',
      options: [
        { label: 'Yes, regularly', w: 18 },
        { label: 'Sometimes',      w: 22 },
        { label: 'Never tried it', w: 25 },
      ],
    },
    {
      q: 'What is hardest about eating well?',
      options: [
        { label: 'Finding the time',     w: 25 },
        { label: 'Knowing portions',     w: 24 },
        { label: 'Staying consistent',   w: 23 },
      ],
    },
  ];

  const slidesEl = document.getElementById('slides');
  const dotsEl = document.getElementById('dots');
  const captionEl = document.getElementById('caption');

  SLIDES.forEach((s, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    if (s.type === 'quiz') {
      slide.innerHTML = `<div class="quiz"><div class="quiz-card" id="quiz-card"></div></div>`;
    } else {
      slide.innerHTML = `<img src="${s.img}" alt="Caloria screen ${i+1}" />`;
    }
    slidesEl.appendChild(slide);

    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Go to slide ${i+1}`);
    dotsEl.appendChild(dot);
  });

  // Quiz state machine
  const quizCard = document.getElementById('quiz-card');
  let quizStep = 0; // 0..n-1 questions, n result
  const answers = [];
  let isAnimating = false;
  let lastProgress = 0;

  function buildScreen() {
    if (quizStep < QUIZ_QUESTIONS.length) {
      const q = QUIZ_QUESTIONS[quizStep];
      const subText = quizStep === 0
        ? "Let's see if Caloria is for you"
        : `Question ${quizStep + 1} of ${QUIZ_QUESTIONS.length}`;
      return `
        <div class="quiz-progress"><span data-progress style="width:${lastProgress}%"></span></div>
        <p class="quiz-sub">${subText}</p>
        <div class="quiz-stage" data-stage>
          <h2 class="quiz-title">${q.q}</h2>
          <div class="quiz-body">
            <div class="quiz-options">
              ${q.options.map((o, idx) => `<button data-i="${idx}">${o.label}</button>`).join('')}
            </div>
          </div>
        </div>
      `;
    }
    const score = computeScore();
    return `
      <div class="confetti-layer" data-confetti></div>
      <div class="quiz-stage" data-stage>
        <div class="quiz-body quiz-result" style="justify-content:center">
          <div class="quiz-score-label">Your score</div>
          <div class="quiz-score">${score}%</div>
          <h2 class="quiz-title" style="min-height:auto">Caloria is a great fit 🎉</h2>
        </div>
      </div>
    `;
  }

  function computeScore() {
    // Sum of selected weights, normalized to a friendly 78-99 range.
    let raw = 0;
    let max = 0;
    QUIZ_QUESTIONS.forEach((q, i) => {
      const choice = answers[i] ?? 0;
      raw += q.options[choice].w;
      max += Math.max(...q.options.map(o => o.w));
    });
    const pct = raw / max; // 0..1
    const score = Math.round(78 + pct * 21); // 78..99
    return Math.max(78, Math.min(99, score));
  }

  function launchConfetti() {
    const layer = quizCard.querySelector('[data-confetti]');
    if (!layer) return;
    const colors = ['#10b981','#34d399','#f59e0b','#ef4444','#3b82f6','#a855f7','#ec4899'];
    const count = 44;
    const cardH = layer.getBoundingClientRect().height || 400;
    for (let i = 0; i < count; i++) {
      const piece = document.createElement('span');
      piece.className = 'confetti-piece';
      // Spread outward (-1 left .. +1 right)
      const dir = (Math.random() - 0.5) * 2;
      // Peak: up and outward
      const peakX = dir * (60 + Math.random() * 130);
      const peakY = -(cardH * (0.55 + Math.random() * 0.35));
      // End: continue past peak in x, fall below start
      const endX = peakX + dir * (40 + Math.random() * 60);
      const endY = 80 + Math.random() * 60;
      const r = (Math.random() * 900 - 200) + 'deg';
      const midR = (Math.random() * 360 - 100) + 'deg';
      const duration = 1500 + Math.random() * 900;
      const delay = Math.random() * 180;
      piece.style.marginLeft = ((Math.random() - 0.5) * 30) + 'px';
      piece.style.background = colors[i % colors.length];
      piece.style.setProperty('--peakX', peakX + 'px');
      piece.style.setProperty('--peakY', peakY + 'px');
      piece.style.setProperty('--endX', endX + 'px');
      piece.style.setProperty('--endY', endY + 'px');
      piece.style.setProperty('--r', r);
      piece.style.setProperty('--midR', midR);
      piece.style.animationDuration = duration + 'ms';
      piece.style.animationDelay = delay + 'ms';
      piece.style.width = (6 + Math.random() * 6) + 'px';
      piece.style.height = (10 + Math.random() * 8) + 'px';
      layer.appendChild(piece);
      setTimeout(() => piece.remove(), duration + delay + 200);
    }
  }

  function currentProgress() {
    if (quizStep >= QUIZ_QUESTIONS.length) return 100;
    return ((quizStep + 1) / (QUIZ_QUESTIONS.length + 1)) * 100;
  }

  function bindScreen() {
    quizCard.querySelectorAll('.quiz-options button').forEach(btn => {
      btn.addEventListener('click', () => {
        if (isAnimating) return;
        answers[quizStep] = parseInt(btn.dataset.i, 10);
        quizStep += 1;
        transition();
      });
    });
    const restart = quizCard.querySelector('[data-restart]');
    if (restart) {
      restart.addEventListener('click', () => {
        if (isAnimating) return;
        quizStep = 0;
        answers.length = 0;
        transition();
      });
    }
  }

  function renderQuiz(animateIn) {
    quizCard.innerHTML = buildScreen();
    bindScreen();
    const stage = quizCard.querySelector('[data-stage]');
    if (animateIn) {
      stage.classList.add('entering');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => stage.classList.remove('entering'));
      });
    }
    // Animate progress bar from 0 to current width after paint
    const bar = quizCard.querySelector('[data-progress]');
    if (bar) {
      const target = currentProgress();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          bar.style.width = target + '%';
          lastProgress = target;
        });
      });
    }
    // Confetti on result screen
    if (quizStep >= QUIZ_QUESTIONS.length) {
      setTimeout(launchConfetti, 120);
    }
  }

  function transition() {
    if (!quizCard) return;
    const stage = quizCard.querySelector('[data-stage]');
    if (!stage) { renderQuiz(true); return; }
    isAnimating = true;
    stage.classList.add('leaving');
    setTimeout(() => {
      renderQuiz(true);
      isAnimating = false;
    }, 340);
  }

  if (quizCard) renderQuiz(true);

  const dots = dotsEl.querySelectorAll('.dot');
  let current = 0;

  let pendingCaption = null;
  function setCaption(i) {
    if (pendingCaption !== null) cancelAnimationFrame(pendingCaption);
    pendingCaption = requestAnimationFrame(() => {
      captionEl.innerHTML = SLIDES[i].caption;
      pendingCaption = null;
    });
  }

  function setActive(i, updateCaption = true) {
    current = i;
    dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    if (updateCaption) setCaption(i);
  }

  function goTo(i) {
    slidesEl.scrollTo({ left: slidesEl.clientWidth * i, behavior: 'smooth' });
    setActive(i);
  }

  dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));

  let scrollTimer;
  slidesEl.addEventListener('scroll', () => {
    const i = Math.round(slidesEl.scrollLeft / slidesEl.clientWidth);
    if (i !== current) {
      current = i;
      dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    }
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => setCaption(current), 80);
  });

  window.addEventListener('resize', () => {
    slidesEl.scrollTo({ left: slidesEl.clientWidth * current, behavior: 'instant' });
  });

  setActive(0);

  const ctaBtn = document.querySelector('.tray button');
  setInterval(() => {
    ctaBtn.classList.add('shimmer-active');
    ctaBtn.addEventListener('animationend', () => ctaBtn.classList.remove('shimmer-active'), { once: true });
  }, 7000);
</script>
</body>
</html>
